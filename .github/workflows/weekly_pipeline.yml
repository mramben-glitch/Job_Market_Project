name: Weekly Automated Job Market Pipeline

on:
  schedule:
    - cron: '0 8 * * 0'  # Fires automatically every Sunday morning at 08:00 AM UTC
  workflow_dispatch:     # Adds the manual "Run workflow" button on GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Safety circuit breaker to protect your free execution minutes

    steps:
    - name: Clone Repository Codebase
      uses: actions/checkout@v4

    - name: Initialize Cloud Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Runtime Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx google-genai google-cloud-bigquery pydantic python-dotenv

    - name: Execute Unified Memory Pipeline
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
      run: |
        python cloud_pipeline.py | tee pipeline_run.log

    - name: Generate Pipeline Health Summary Dashboard
      if: always()
      run: |
        SUMMARY_LINE=$(grep "METRICS_SUMMARY:" pipeline_run.log || echo "METRICS_SUMMARY: Status=No Log Line Discovered")
        echo "### 🚀 Pipeline Run Metrics Summary" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        echo "$SUMMARY_LINE" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
name: Weekly Automated Job Market Pipeline

on:
  schedule:
    # Triggers every Sunday night at exactly midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Keeps the manual "Run workflow" trigger active for on-demand testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx google-genai google-cloud-bigquery pydantic python-dotenv

      - name: Run pipeline
        run: python cloud_pipeline.py | tee pipeline_run.log
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
          GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}

      - name: Generate Step Summary Metrics
        run: |
          SUMMARY_LINE=$(grep "METRICS_SUMMARY:" pipeline_run.log || echo "METRICS_SUMMARY: Status=No Log Line Discovered")
          echo "### 🚀 Pipeline Run Metrics Summary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          echo "$SUMMARY_LINE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY